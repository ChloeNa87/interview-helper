<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Interview Cheat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #39FF14; font-family: sans-serif; }
        .neon-border { border: 1px solid #39FF14; }
        .split-pane { height: calc(50vh - 60px); }
        #settings-modal { display: none; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body class="overflow-hidden">

    <!-- 설정 모달 (API 키 입력) -->
    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 p-6 rounded-xl neon-border w-full max-w-sm">
            <h2 class="text-xl mb-4 font-bold">Settings</h2>
            <input id="api-key-input" type="password" placeholder="Google AI API Key 입력" 
                   class="w-full p-3 bg-black border border-green-500 rounded text-green-400 mb-4">
            <button onclick="saveSettings()" class="w-full py-3 bg-green-600 text-black font-bold rounded">저장 후 닫기</button>
        </div>
    </div>

    <!-- 상단: 면접관 말 & 번역 -->
    <div class="split-pane p-4 border-b border-green-900 overflow-y-auto">
        <div class="text-sm text-gray-500 mb-2 font-bold uppercase">Interviewer (Hearing...)</div>
        <div id="interviewer-eng" class="text-xl mb-2 text-white">마이크를 켜고 말씀하세요...</div>
        <div id="interviewer-kor" class="text-lg text-green-500 opacity-80 italic">번역이 여기에 표시됩니다.</div>
    </div>

    <!-- 하단: AI 답변 추천 -->
    <div class="split-pane p-4 overflow-y-auto bg-gray-900/30">
        <div class="text-sm text-gray-500 mb-4 font-bold uppercase">Recommended Answers (Select)</div>
        <div id="ai-loading" class="hidden animate-pulse text-yellow-400 mb-4">답변 생성 중...</div>
        
        <div id="answer-options" class="space-y-6">
            <!-- 답변 1 -->
            <div class="p-4 rounded-lg border border-green-800 bg-black/50">
                <div id="ans1-eng" class="text-2xl font-bold mb-1 italic">Answer 1 will appear here.</div>
                <div id="ans1-kor" class="text-lg text-gray-400">해석이 여기에 표시됩니다.</div>
            </div>
            <!-- 답변 2 -->
            <div class="p-4 rounded-lg border border-green-800 bg-black/50">
                <div id="ans2-eng" class="text-2xl font-bold mb-1 italic">Answer 2 will appear here.</div>
                <div id="ans2-kor" class="text-lg text-gray-400">해석이 여기에 표시됩니다.</div>
            </div>
        </div>
    </div>

    <!-- 하단 컨트롤 바 -->
    <div class="h-[60px] flex items-center justify-between px-6 bg-black border-t border-green-900">
        <button onclick="toggleSettings()" class="text-xs text-gray-500 underline">API 설정</button>
        <button id="start-btn" onclick="toggleRecognition()" 
                class="px-8 py-2 bg-green-500 text-black font-extrabold rounded-full shadow-[0_0_15px_rgba(57,255,20,0.5)]">
            START
        </button>
        <div id="status-dot" class="w-3 h-3 bg-red-600 rounded-full"></div>
    </div>

    <script>
        let isListening = false;
        let recognition;
        let API_KEY = localStorage.getItem('GEMINI_API_KEY') || "";

        // 초기 설정 확인
        if(!API_KEY) document.getElementById('settings-modal').style.display = 'flex';

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function saveSettings() {
            const val = document.getElementById('api-key-input').value;
            if(val) {
                localStorage.setItem('GEMINI_API_KEY', val);
                API_KEY = val;
                toggleSettings();
            }
        }

        // 음성 인식 설정
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                        processFinalQuestion(finalTranscript);
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                document.getElementById('interviewer-eng').innerText = interimTranscript || finalTranscript;
            };

            recognition.onend = () => {
                if(isListening) recognition.start(); // 끊기지 않게 재실행
            };
        }

        function toggleRecognition() {
            const btn = document.getElementById('start-btn');
            const dot = document.getElementById('status-dot');
            
            if (!isListening) {
                recognition.start();
                isListening = true;
                btn.innerText = "STOP";
                btn.classList.replace('bg-green-500', 'bg-red-600');
                dot.classList.replace('bg-red-600', 'bg-green-500');
            } else {
                recognition.stop();
                isListening = false;
                btn.innerText = "START";
                btn.classList.replace('bg-red-600', 'bg-green-500');
                dot.classList.replace('bg-green-500', 'bg-red-600');
            }
        }

        async function processFinalQuestion(text) {
            if(!API_KEY) return alert("API 키를 먼저 설정해주세요.");
            
            document.getElementById('ai-loading').classList.remove('hidden');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `입력된 문장: "${text}"
                                1. 이 문장을 한국어로 번역해줘.
                                2. 이 질문에 대해 초등학생 수준의 아주 쉽고 명확한 영어 답변 2개를 만들어줘.
                                3. 각 답변은 반드시 영어 한 문장과 그에 대한 한국어 해석을 포함해야 해.
                                
                                응답 형식(반드시 이 형식을 지켜줘):
                                번역: [한국어 번역]
                                ---
                                답1: [영어 답변] / [해석]
                                답2: [영어 답변] / [해석]`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                updateUI(result);
            } catch (error) {
                console.error("AI 호출 오류:", error);
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        }

        function updateUI(rawText) {
            const sections = rawText.split('---');
            
            // 질문 번역 추출
            const translationMatch = sections[0].match(/번역:\s*(.*)/);
            if(translationMatch) document.getElementById('interviewer-kor').innerText = translationMatch[1];

            // 답변 추출
            const ansLines = sections[1].trim().split('\n');
            ansLines.forEach(line => {
                if(line.includes('답1:')) {
                    const content = line.replace('답1:', '').split('/');
                    document.getElementById('ans1-eng').innerText = content[0].trim();
                    document.getElementById('ans1-kor').innerText = content[1] ? content[1].trim() : "";
                }
                if(line.includes('답2:')) {
                    const content = line.replace('답2:', '').split('/');
                    document.getElementById('ans2-eng').innerText = content[0].trim();
                    document.getElementById('ans2-kor').innerText = content[1] ? content[1].trim() : "";
                }
            });
        }
    </script>
</body>
</html>
